<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PokeNav: a game-first Pokemon encyclopedia for browsing, cross-linking, and comparing Pokemon across all games." />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; connect-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; form-action 'self'; frame-src 'none';"
    />
    <meta property="og:title" content="PokeNav Pokemon Encyclopedia" />
    <meta property="og:description" content="Browse, compare, and study Pokemon across every game with cross-linked species, moves, abilities, and trainer battles." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/svg+xml" href="/PokeNav/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>PokeNav</title>
    <meta name="author" content="TeamStarWolf">
    <!-- GitHub Pages SPA redirect handler (works with 404.html) -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          var newPath = l.pathname.slice(0, -1) + decoded;
          var base = '/PokeNav';
          if (newPath.indexOf(base) === 0 && newPath.indexOf('//') === -1) {
            window.history.replaceState(null, null, newPath + l.hash);
          }
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
